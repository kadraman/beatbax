<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BeatBax Web UI - Phase 3</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Back link positioned in bottom-right */
      #backLink {
        position: fixed;
        bottom: 8px;
        right: 8px;
        padding: 6px 12px;
        background: rgba(60, 60, 60, 0.9);
        color: #d4d4d4;
        text-decoration: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        z-index: 10000;
        border: 1px solid #444;
        transition: all 0.2s;
      }

      #backLink:hover {
        background: rgba(80, 80, 80, 0.95);
        border-color: #666;
      }

      /* Forward link positioned in bottom-left */
      #forwardLink {
        position: fixed;
        bottom: 8px;
        left: 8px;
        padding: 6px 12px;
        background: rgba(60, 60, 60, 0.9);
        color: #d4d4d4;
        text-decoration: none;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 500;
        z-index: 10000;
        border: 1px solid #444;
        transition: all 0.2s;
      }

      #forwardLink:hover {
        background: rgba(80, 80, 80, 0.95);
        border-color: #666;
      }

      /* Drag-and-drop overlay (managed by DragDropHandler) */
      .bb-drop-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(14, 99, 156, 0.25);
        border: 3px dashed #569cd6;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .bb-drop-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .bb-drop-overlay__label {
        font-size: 20px;
        font-weight: 600;
        color: #9cdcfe;
        background: rgba(30, 30, 30, 0.85);
        padding: 20px 40px;
        border-radius: 8px;
        border: 1px solid #569cd6;
      }
    </style>
  </head>
  <body>
    <a href="index-phase2.html" id="backLink" title="Return to Phase 2">← Phase 2</a>
    <a href="index-phase4.html" id="forwardLink" title="Advance to Phase 4">Phase 4 →</a>
    <div id="app"></div>
    <script type="module" src="/src/main-phase3.ts"></script>
  </body>
</html>
