<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="BeatBax">
  <!-- Handheld body -->
  <rect x="1" y="1" width="30" height="30" rx="5.5" fill="#ececec" stroke="#b0b0b0" stroke-width="0.75"/>
  <!-- Screen bezel -->
  <rect x="5" y="5" width="22" height="12" rx="2.25" fill="#242424"/>
  <rect x="6" y="6" width="20" height="10" rx="1.75" fill="#0a0a0a"/>
  <!-- LCD waveform -->
  <path
    d="M7.5 11.5 L9 9.5 L10.5 13 L12 8.5 L13.5 12 L15 9.5 L16.5 11.5 L18 10 L19.5 12.5 L21 10.5 L22.5 12 L24 11"
    stroke="#c6d04a"
    stroke-width="1.15"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- D-pad -->
  <rect x="8.75" y="20.75" width="2.5" height="2.5" rx="0.35" fill="#2f2f2f"/>
  <rect x="7.5" y="22" width="5" height="2.5" rx="0.35" fill="#2f2f2f"/>
  <rect x="8.75" y="23.75" width="2.5" height="2.5" rx="0.35" fill="#2f2f2f"/>
  <!-- A / B buttons -->
  <circle cx="23.25" cy="21.75" r="1.55" fill="#2f2f2f"/>
  <circle cx="25.75" cy="24.25" r="1.55" fill="#2f2f2f"/>
  <!-- Select / Start -->
  <rect x="11.8" y="26.35" width="3.2" height="1.15" rx="0.55" fill="#555" transform="rotate(-18 13.4 26.9)"/>
  <rect x="16.2" y="26.35" width="3.2" height="1.15" rx="0.55" fill="#555" transform="rotate(-18 17.8 26.9)"/>
</svg>
