<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>BeatBax</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: var(--bb-app-bg);
        color: var(--bb-fg);
        overflow: hidden;
      }

      #app {
        width: 100vw;
        /* 100dvh correctly excludes the Safari address bar on iOS/iPadOS;
           100vh fallback for browsers that don't support dynamic viewport units. */
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        /* Prevent content from sliding under the home indicator / notch. */
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      /* ── Boot spinner (critical CSS — must load before JS) ── */
      @keyframes bb-spin { to { transform: rotate(360deg); } }
      #bb-boot-spinner {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: var(--bb-app-bg, #1e1e1e);
        z-index: 9999;
        color: #aaa;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.8125rem;
        letter-spacing: 0.03em;
      }
      #bb-boot-spinner .bb-spinner-ring {
        width: 2.75rem;
        height: 2.75rem;
        border: 4px solid rgba(255 255 255 / 12%);
        border-top-color: #4ec9b0;
        border-radius: 9999px;
        animation: bb-spin 0.7s linear infinite;
      }

      /* ── CRT power-on overlay (critical CSS) ─────────────────────────── */
      @keyframes bb-crt-poweron {
        0%   { filter: brightness(0) blur(4px); opacity: 1; }
        8%   { filter: brightness(0.07) blur(2px); opacity: 1; }
        18%  { filter: brightness(0.18) blur(1px); opacity: 1; }
        35%  { filter: brightness(0.55) blur(0px); opacity: 1; }
        60%  { filter: brightness(1.10) blur(0px); opacity: 1; }
        80%  { filter: brightness(1.00) blur(0px); opacity: 1; }
        100% { filter: brightness(1.00) blur(0px); opacity: 0; }
      }
      #bb-boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        pointer-events: none;
        /* scanlines */
        background:
          repeating-linear-gradient(
            to bottom,
            transparent 0px,
            transparent 3px,
            rgba(0, 0, 0, 0.22) 3px,
            rgba(0, 0, 0, 0.22) 4px
          );
        animation: bb-crt-poweron 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
    </style>
  </head>
  <body>
    <div id="bb-boot-overlay" aria-hidden="true"></div>
    <div id="bb-boot-spinner" aria-label="Loading BeatBax" role="status">
      <div class="bb-spinner-ring" aria-hidden="true"></div>
      <span>Loading BeatBax…</span>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
