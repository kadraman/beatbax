appId: com.beatbax.desktop
productName: BeatBax
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
directories:
  buildResources: build
extraFiles:
  - from: build/README.txt
    to: README.txt
  - from: build/RELEASE-NOTES.txt
    to: RELEASE-NOTES.txt
  - from: build/songs
    to: songs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!playwright.config.ts'
  - '!jest.config.cjs'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,README.md}'
  - '!{.env,.env.*,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
protocols:
  - name: BeatBax song links
    schemes:
      - beatbax
fileAssociations:
  - ext: bax
    name: BeatBax Song
    description: BeatBax song file
    role: Editor
win:
  icon: build/icon.ico
  executableName: BeatBax
  target:
    - nsis
    - portable
mac:
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
linux:
  category: AudioVideo
  executableName: BeatBax
  syncDesktopName: true
  maintainer: The BeatBax Team <kadraman@users.noreply.github.com>
  target:
    - AppImage
    - deb
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  selectPerMachineByDefault: false
  createDesktopShortcut: always
  shortcutName: ${productName}
dmg:
  artifactName: ${productName}-${version}.${ext}
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: kadraman
  repo: beatbax
