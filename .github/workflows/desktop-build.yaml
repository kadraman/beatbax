name: "Desktop: Build"

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/app-core/**'
      - 'packages/engine/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop-build.yaml'
  push:
    branches:
      - main
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate desktop shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: v22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build-all

      - name: Run desktop unit tests
        run: npm run desktop:test

      - name: Install Linux GUI dependencies for Electron
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64 libgbm1

      - name: Run desktop Electron smoke test
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm -w @beatbax/desktop run test:e2e

  package:
    name: Package desktop (${{ matrix.os }})
    needs: validate
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/desktop-v') }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: v22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build-all

      - name: Setup codesign certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not configured; building unsigned macOS artifacts"
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

      - name: Build installers
        env:
          APPLE_ID: ${{ secrets.MAC_NOTARIZE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.MAC_NOTARIZE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.MAC_NOTARIZE_TEAM }}
        run: npm run desktop:dist

      - name: Verify macOS code signature
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not configured; skipping macOS signature verification"
            exit 0
          fi
          APP_PATH=$(find apps/desktop/dist -maxdepth 2 -name 'BeatBax.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "BeatBax.app not found; skipping signature verification"
            exit 0
          fi
          codesign -dv --verbose=4 "$APP_PATH"
          spctl -a -vv -t install "$APP_PATH"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            apps/desktop/dist/BeatBax-*.exe
            apps/desktop/dist/BeatBax-*.dmg
            apps/desktop/dist/BeatBax-*.zip
            apps/desktop/dist/BeatBax-*.AppImage
            apps/desktop/dist/BeatBax-*.deb
          if-no-files-found: error

  release:
    name: Publish desktop release
    needs: package
    if: ${{ startsWith(github.ref, 'refs/tags/desktop-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/BeatBax-*.exe
            release-artifacts/**/BeatBax-*.dmg
            release-artifacts/**/BeatBax-*.zip
            release-artifacts/**/BeatBax-*.AppImage
            release-artifacts/**/BeatBax-*.deb
          overwrite_assets: true
          generate_release_notes: true
